# 夜间真实模型冒烟:真实 PaddleOCR / yolov8n 端到端(pytest -m smoke)。
# 较重(需下载模型与重依赖),不随每次 push 跑;每天定时 + 支持手动触发。
# 注:本仓库主库在 Gitee,本文件用于 GitHub 镜像场景;Gitee Go 等价命令:
#   uv sync --extra dev --extra ocr --extra yolo && uv run pytest -m smoke -q
name: Smoke

on:
  schedule:
    - cron: "30 19 * * *" # UTC 19:30 = 北京时间次日 03:30
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: 缓存依赖与模型(uv / PaddleOCR 模型 / yolov8n 权重)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            ~/.paddleocr
            yolov8n.pt
          key: smoke-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: smoke-${{ runner.os }}-

      - name: 安装全量依赖(含 OCR/YOLO 重依赖)
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv sync --extra dev --extra ocr --extra yolo

      - name: 真实模型冒烟测试
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv run pytest -m smoke -q
